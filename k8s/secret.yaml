apiVersion: v1
kind: Secret
metadata:
  name: payments-secret
type: Opaque
# ATENÇÃO: valores de exemplo (placeholders). Não commitar segredos reais.
# Preencha os valores reais antes do apply, ou crie o Secret manualmente:
#   kubectl create secret generic payments-secret \
#     --from-literal=RABBITMQ_USERNAME='...' \
#     --from-literal=RABBITMQ_PASSWORD='...'
# Devem bater com o rabbitmq-secret.
stringData:
  RABBITMQ_USERNAME: "CHANGE_ME_RABBITMQ_USER"
  RABBITMQ_PASSWORD: "CHANGE_ME_RABBITMQ_PASSWORD"
